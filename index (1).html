<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prachi — Web Dev Assignments</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f5f0e8;
      --ink: #1a1408;
      --accent: #c94a1e;
      --muted: #8a7e6e;
      --card-bg: #faf7f2;
      --border: #d9d0c0;
      --hover-bg: #1a1408;
      --hover-ink: #f5f0e8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NOISE TEXTURE OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.5;
    }

    /* ── HEADER ── */
    header {
      padding: 4rem 6vw 3rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 1.5rem;
      animation: fadeUp 0.6s ease both;
    }

    .header-left h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.8rem, 6vw, 5rem);
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .header-left h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .header-left p {
      margin-top: 0.75rem;
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.5rem;
    }

    .pill {
      background: var(--ink);
      color: var(--bg);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.4rem 0.9rem;
      border-radius: 100px;
    }

    .repo-link {
      color: var(--muted);
      font-size: 0.72rem;
      text-decoration: none;
      letter-spacing: 0.04em;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: color 0.2s;
    }
    .repo-link:hover { color: var(--accent); }
    .repo-link svg { width: 14px; height: 14px; }

    /* ── GRID ── */
    main {
      padding: 4rem 6vw;
    }

    .section-label {
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }

    .card {
      background: var(--card-bg);
      padding: 2rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 180px;
      transition: background 0.25s, color 0.25s;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.5s ease both;
    }

    .card:nth-child(1)  { animation-delay: 0.05s; }
    .card:nth-child(2)  { animation-delay: 0.10s; }
    .card:nth-child(3)  { animation-delay: 0.15s; }
    .card:nth-child(4)  { animation-delay: 0.20s; }
    .card:nth-child(5)  { animation-delay: 0.25s; }
    .card:nth-child(6)  { animation-delay: 0.30s; }
    .card:nth-child(7)  { animation-delay: 0.35s; }
    .card:nth-child(8)  { animation-delay: 0.40s; }
    .card:nth-child(9)  { animation-delay: 0.45s; }
    .card:nth-child(10) { animation-delay: 0.50s; }
    .card:nth-child(11) { animation-delay: 0.55s; }
    .card:nth-child(12) { animation-delay: 0.60s; }
    .card:nth-child(13) { animation-delay: 0.65s; }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px;
      height: 0;
      background: var(--accent);
      transition: height 0.3s ease;
    }

    .card:hover {
      background: var(--hover-bg);
      color: var(--hover-ink);
    }

    .card:hover::before {
      height: 100%;
    }

    .card-num {
      font-family: 'DM Serif Display', serif;
      font-size: 3rem;
      line-height: 1;
      color: var(--border);
      transition: color 0.25s;
      user-select: none;
    }

    .card:hover .card-num {
      color: rgba(245,240,232,0.15);
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .card-title {
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.04em;
    }

    .card-arrow {
      font-size: 1.1rem;
      transition: transform 0.25s;
      opacity: 0.4;
    }

    .card:hover .card-arrow {
      transform: translate(3px, -3px);
      opacity: 1;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 2.5rem 6vw;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    footer p {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    footer a:hover { text-decoration: underline; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      header { padding: 2.5rem 5vw 2rem; }
      main { padding: 2.5rem 0; }
      .section-label { padding: 0 5vw; }
      .grid { border-left: none; border-right: none; }
      footer { padding: 2rem 5vw; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <h1>Web Dev<br /><em>Assignments</em></h1>
      <p>Prachi &nbsp;·&nbsp; 13 Projects</p>
    </div>
    <div class="header-right">
      <span class="pill">HTML · CSS · JS</span>
      <a class="repo-link" href="https://github.com/Prachi1196/web-development" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.757-1.333-1.757-1.089-.745.083-.729.083-.729 1.205.084 1.84 1.236 1.84 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.418-1.305.762-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23a11.52 11.52 0 013.003-.404c1.02.005 2.047.138 3.006.404 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
        Prachi1196/web-development
      </a>
    </div>
  </header>

  <main>
    <p class="section-label">All Assignments</p>

    <div class="grid" id="assignments-grid">
      <!-- Cards injected by JS -->
    </div>
  </main>

  <footer>
    <p>© 2025 Prachi &nbsp;·&nbsp; Hosted on <a href="https://pages.github.com" target="_blank" rel="noopener">GitHub Pages</a></p>
    <p><a href="https://github.com/Prachi1196/web-development" target="_blank" rel="noopener">View source on GitHub ↗</a></p>
  </footer>

  <script>
    const assignments = [
      { num: 1,  label: 'Assignment 1'  },
      { num: 2,  label: 'Assignment 2'  },
      { num: 3,  label: 'Assignment 3'  },
      { num: 4,  label: 'Assignment 4'  },
      { num: 5,  label: 'Assignment 5'  },
      { num: 6,  label: 'Assignment 6'  },
      { num: 7,  label: 'Assignment 7'  },
      { num: 8,  label: 'Assignment 8'  },
      { num: 9,  label: 'Assignment 9'  },
      { num: 10, label: 'Assignment 10' },
      { num: 11, label: 'Assignment 11' },
      { num: 12, label: 'Assignment 12' },
      { num: 13, label: 'Assignment 13' },
    ];

    const grid = document.getElementById('assignments-grid');

    assignments.forEach(({ num, label }) => {
      const href = `Assignment%20${num}/Practical${num}.html`;
      const a = document.createElement('a');
      a.className = 'card';
      a.href = href;
      a.innerHTML = `
        <div class="card-num">${String(num).padStart(2, '0')}</div>
        <div class="card-footer">
          <span class="card-title">${label}</span>
          <span class="card-arrow">↗</span>
        </div>
      `;
      grid.appendChild(a);
    });
  </script>
</body>
</html>
